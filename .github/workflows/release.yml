name: Build Runtime Package and Deploy Update Feed

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "Arian Jahandarfards MS Project Add-in.slnx"

      - name: Install Azure PowerShell
        shell: pwsh
        run: Install-Module -Name Az.Storage -Force -AllowClobber -Scope CurrentUser

      - name: Import Certificate
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.CERTIFICATE_BASE64 }}")
          $certPath = "$env:RUNNER_TEMP\AJCert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String "${{ secrets.CERTIFICATE_PASSWORD }}" -AsPlainText -Force)

      - name: Build runtime package
        shell: pwsh
        run: .\scripts\Build-RuntimePackage.ps1 -Configuration Release

      - name: Read runtime manifest
        id: runtime_manifest
        shell: pwsh
        run: |
          $manifestPath = "artifacts\runtime-package\Release\version.json"
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $version = $manifest.version
          $zipName = Split-Path -Leaf $manifest.downloadZipFile
          $sha256 = $manifest.sha256
          "VERSION=$version" >> $env:GITHUB_OUTPUT
          "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
          "SHA256=$sha256" >> $env:GITHUB_OUTPUT

      - name: Upload runtime ZIP to Azure Blob
        shell: pwsh
        run: |
          $zipName = "${{ steps.runtime_manifest.outputs.ZIP_NAME }}"
          $connStr = "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
          $ctx = New-AzStorageContext -ConnectionString $connStr
          Set-AzStorageBlobContent -File "artifacts\runtime-package\Release\$zipName" -Container "releases" -Blob $zipName -Context $ctx -Force

      - name: Update live version.json
        shell: pwsh
        run: |
          $version = "${{ steps.runtime_manifest.outputs.VERSION }}"
          $zipName = "${{ steps.runtime_manifest.outputs.ZIP_NAME }}"
          $sha256 = "${{ steps.runtime_manifest.outputs.SHA256 }}"
          $zipUrl = "https://ajtools.blob.core.windows.net/releases/$zipName"
          $json = [ordered]@{
            version = $version
            buildDate = (Get-Date).ToString("yyyy-MM-dd")
            downloadZipFile = $zipUrl
            downloadUrl = $zipUrl
            releaseNotes = "Version $version"
            releaseNotesUrl = ""
            sha256 = $sha256
          } | ConvertTo-Json

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/arianjahandarfard-cyber/version.json.git versionrepo
          $json | Set-Content "versionrepo/version.json" -Encoding UTF8
          Set-Location versionrepo
          git add version.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Auto-update to v$version"
            git push
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.runtime_manifest.outputs.VERSION }}
          name: v${{ steps.runtime_manifest.outputs.VERSION }}
          body: Runtime release v${{ steps.runtime_manifest.outputs.VERSION }}
          files: |
            artifacts/runtime-package/Release/${{ steps.runtime_manifest.outputs.ZIP_NAME }}
            artifacts/runtime-package/Release/version.json
