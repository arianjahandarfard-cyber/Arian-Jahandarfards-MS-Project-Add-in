name: Build, Zip, and Deploy to Azuree

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "Arian Jahandarfards MS Project Add-in.slnx"

      - name: Install Azure PowerShell
        shell: pwsh
        run: Install-Module -Name Az.Storage -Force -AllowClobber -Scope CurrentUser

      - name: Import Certificate
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.CERTIFICATE_BASE64 }}")
          $certPath = "$env:RUNNER_TEMP\AJCert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String "${{ secrets.CERTIFICATE_PASSWORD }}" -AsPlainText -Force)

      - name: Build Release
        run: msbuild "Arian Jahandarfards MS Project Add-in.slnx" /p:Configuration=Release /p:Platform="Any CPU"

      - name: Get version from AssemblyInfo
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content "Arian Jahandarfards MS Project Add-in/Properties/AssemblyInfo.cs" -Raw
          if ($content -match '\[assembly: AssemblyVersion\("(\d+\.\d+\.\d+\.\d+)"\)\]') {
            $version = $Matches[1]
          } else {
            Write-Error "Could not find AssemblyVersion"
            exit 1
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Zip output
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          Compress-Archive -Path "Arian Jahandarfards MS Project Add-in/bin/Release/*" -DestinationPath "AJAddIn-v$version.zip"

      - name: Upload zip to Azure Blob
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $zipName = "AJAddIn-v$version.zip"
          $connStr = "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
          $ctx = New-AzStorageContext -ConnectionString $connStr
          Set-AzStorageBlobContent -File $zipName -Container "releases" -Blob $zipName -Context $ctx -Force

      - name: Update version.json on GitHub Pages
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $zipName = "AJAddIn-v$version.zip"
          $json = @{
            version = $version
            downloadUrl = "https://ajtools.blob.core.windows.net/releases/$zipName"
            releaseNotes = "Version $version"
          } | ConvertTo-Json
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/arianjahandarfard-cyber/version.json.git versionrepo
          $json | Set-Content "versionrepo/version.json"
          Set-Location versionrepo
          git add version.json
          git commit -m "Auto-update to v$version"
          git push
