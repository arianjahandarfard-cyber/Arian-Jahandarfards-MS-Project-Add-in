name: Build and Release

on:
  push:
    tags:
      - 'v*'   # triggers on any tag like v1.0.0, v2.1.3

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ArianJahandarfardsAddIn.sln

      - name: Build Release
        run: msbuild ArianJahandarfardsAddIn.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Zip output
        run: Compress-Archive -Path "ArianJahandarfardsAddIn/bin/Release/*" -DestinationPath "AJAddIn-${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AJAddIn-${{ github.ref_name }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
